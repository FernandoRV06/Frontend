<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: white; font-family: Arial; }
        #info { text-align: center; padding: 10px; font-size: 18px; }
        #unity-canvas { display: block; margin: 0 auto; width: 960px; height: 600px; }
    </style>
</head>
<body>
    <div id="info">Cargando datos del usuario...</div>
    <canvas id="unity-canvas"></canvas>

    <script src="config.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const userId = params.get("id");

        if (!userId) {
            alert("No se encontró ID de usuario. Vuelve al login.");
            window.location.href = "index.html";
        }

        window.USER_ID = userId;
        window.API_URL_GAME = API_URL;

        fetch(API_URL + "/users/" + userId)
            .then(res => res.json())
            .then(data => {
                document.getElementById("info").textContent =
                    " Jugador: " + data.username + " | Puntos guardados: " + data.score;
            })
            .catch(() => {
                document.getElementById("info").textContent = " Error al conectar con la API";
            });
    </script>

</body>
</html>
